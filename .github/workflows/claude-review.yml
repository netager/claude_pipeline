name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          direct_prompt: |
            이 PR의 변경 사항을 코드 리뷰해줘. 다음 항목을 중심으로 검토해:
            - 버그 및 로직 오류
            - 타입 안전성 (타입 힌트 누락, 잘못된 타입 등)
            - 엣지 케이스 처리 (예: 0으로 나누기, None 입력 등)
            - 테스트 커버리지 (변경된 함수에 대한 테스트가 충분한지)
            - 코드 가독성 및 네이밍
            리뷰 결과는 PR 코멘트로 남겨줘.
